<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#111827">Icon Forge — 架构图</text>

  <!-- === Layer 1: Client === -->
  <rect x="20" y="55" width="920" height="90" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="74" font-size="11" fill="#16a34a" font-weight="600">Client Layer</text>

  <!-- Browser -->
  <rect x="60" y="82" width="180" height="50" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="60" y="82" width="180" height="16" rx="8" fill="#f3f4f6"/>
  <circle cx="74" cy="90" r="3" fill="#ef4444"/>
  <circle cx="84" cy="90" r="3" fill="#f59e0b"/>
  <circle cx="94" cy="90" r="3" fill="#22c55e"/>
  <text x="150" y="114" text-anchor="middle" font-size="13" fill="#111827" font-weight="500">浏览器</text>

  <!-- React App -->
  <rect x="300" y="82" width="180" height="50" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="102" text-anchor="middle" font-size="13" fill="#111827" font-weight="500">React App</text>
  <text x="390" y="118" text-anchor="middle" font-size="10" fill="#6b7280">icon.weweekly.online</text>

  <!-- SSE Client -->
  <rect x="540" y="82" width="160" height="50" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="102" text-anchor="middle" font-size="13" fill="#111827" font-weight="500">SSE Client</text>
  <text x="620" y="118" text-anchor="middle" font-size="10" fill="#6b7280">EventSource 实时流</text>

  <!-- Arrows in client -->
  <line x1="240" y1="107" x2="295" y2="107" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="480" y1="107" x2="535" y2="107" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- === Layer 2: Cloudflare Edge === -->
  <rect x="20" y="160" width="920" height="200" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="179" font-size="11" fill="#2563eb" font-weight="600">Cloudflare Edge</text>

  <!-- Worker -->
  <rect x="60" y="190" width="200" height="60" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="216" text-anchor="middle" font-size="13" fill="#111827" font-weight="500">CF Worker</text>
  <text x="160" y="232" text-anchor="middle" font-size="10" fill="#6b7280">api-icon.weweekly.online</text>

  <!-- Durable Object -->
  <rect x="340" y="190" width="200" height="60" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="216" text-anchor="middle" font-size="13" fill="#111827" font-weight="500">Durable Object</text>
  <text x="440" y="232" text-anchor="middle" font-size="10" fill="#6b7280">GenerationQueue (单例)</text>

  <!-- KV -->
  <rect x="620" y="190" width="140" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="690" y="216" text-anchor="middle" font-size="13" fill="#111827" font-weight="500">KV Store</text>
  <text x="690" y="232" text-anchor="middle" font-size="10" fill="#6b7280">RATE_LIMIT</text>

  <!-- Worker sub-functions -->
  <rect x="80" y="275" width="140" height="36" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="150" y="298" text-anchor="middle" font-size="11" fill="#7c3aed">synthesizePrompts()</text>

  <rect x="240" y="275" width="130" height="36" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="305" y="298" text-anchor="middle" font-size="11" fill="#7c3aed">generateIcon()</text>

  <rect x="390" y="275" width="160" height="36" rx="6" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1"/>
  <text x="470" y="298" text-anchor="middle" font-size="11" fill="#7c3aed">removeBackground()</text>

  <!-- Arrows Worker ↔ DO ↔ KV -->
  <line x1="260" y1="220" x2="335" y2="220" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="540" y1="220" x2="615" y2="220" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Arrow from React to Worker -->
  <line x1="390" y1="132" x2="160" y2="185" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="260" y="152" font-size="10" fill="#6b7280">POST /api/generate</text>

  <!-- Arrow SSE from DO to SSE Client -->
  <line x1="440" y1="190" x2="620" y2="137" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="550" y="158" font-size="10" fill="#6b7280">SSE stream</text>

  <!-- === Layer 3: Dashscope API === -->
  <rect x="20" y="380" width="920" height="130" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="399" font-size="11" fill="#9333ea" font-weight="600">Dashscope API (阿里云通义)</text>

  <!-- qwen3.6-plus -->
  <rect x="80" y="412" width="220" height="60" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="438" text-anchor="middle" font-size="13" fill="#111827" font-weight="500">qwen3.6-plus</text>
  <text x="190" y="454" text-anchor="middle" font-size="10" fill="#6b7280">Prompt 合成（LLM 兼容端点）</text>

  <!-- wan2.7-image-pro generate -->
  <rect x="370" y="412" width="220" height="60" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="480" y="438" text-anchor="middle" font-size="13" fill="#111827" font-weight="500">wan2.7-image-pro</text>
  <text x="480" y="454" text-anchor="middle" font-size="10" fill="#6b7280">图片生成（原生 API）</text>

  <!-- wan2.7-image-pro edit -->
  <rect x="660" y="412" width="220" height="60" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="770" y="438" text-anchor="middle" font-size="13" fill="#111827" font-weight="500">wan2.7-image-pro</text>
  <text x="770" y="454" text-anchor="middle" font-size="10" fill="#6b7280">去背景（编辑模式）</text>

  <!-- Arrows from functions to Dashscope -->
  <line x1="150" y1="311" x2="190" y2="407" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="305" y1="311" x2="480" y2="407" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="470" y1="311" x2="770" y2="407" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- === Flow Pipeline === -->
  <rect x="20" y="530" width="920" height="150" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="36" y="549" font-size="11" fill="#ea580c" font-weight="600">生成管线 (Pipeline Flow)</text>

  <!-- Step 1 -->
  <rect x="40" y="565" width="140" height="50" rx="24" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="110" y="586" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="500">用户输入</text>
  <text x="110" y="600" text-anchor="middle" font-size="10" fill="#6b7280">"播客电台"</text>

  <!-- Step 2 -->
  <rect x="220" y="565" width="140" height="50" rx="8" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="290" y="586" text-anchor="middle" font-size="12" fill="#9333ea" font-weight="500">Prompt 合成</text>
  <text x="290" y="600" text-anchor="middle" font-size="10" fill="#6b7280">qwen3.6-plus</text>

  <!-- Step 3 -->
  <rect x="400" y="565" width="140" height="50" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="470" y="586" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="500">图片生成 ×2</text>
  <text x="470" y="600" text-anchor="middle" font-size="10" fill="#6b7280">wan2.7-image-pro</text>

  <!-- Step 4 -->
  <rect x="580" y="565" width="140" height="50" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="650" y="586" text-anchor="middle" font-size="12" fill="#ea580c" font-weight="500">去背景 ×2</text>
  <text x="650" y="600" text-anchor="middle" font-size="10" fill="#6b7280">编辑模式</text>

  <!-- Step 5 -->
  <rect x="760" y="565" width="140" height="50" rx="24" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="830" y="586" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="500">RGBA PNG</text>
  <text x="830" y="600" text-anchor="middle" font-size="10" fill="#6b7280">2048×2048 透明底</text>

  <!-- Pipeline arrows -->
  <line x1="180" y1="590" x2="215" y2="590" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="360" y1="590" x2="395" y2="590" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="540" y1="590" x2="575" y2="590" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="720" y1="590" x2="755" y2="590" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- Time estimates -->
  <text x="290" y="634" text-anchor="middle" font-size="10" fill="#9ca3af">~10s</text>
  <text x="470" y="634" text-anchor="middle" font-size="10" fill="#9ca3af">~15s (并行)</text>
  <text x="650" y="634" text-anchor="middle" font-size="10" fill="#9ca3af">~15s</text>
  <text x="480" y="654" text-anchor="middle" font-size="11" fill="#6b7280">总耗时 ~30-45s</text>

  <!-- Legend -->
  <g transform="translate(750, 55)">
    <text x="0" y="0" font-size="11" fill="#6b7280" font-weight="600">图例</text>
    <line x1="0" y1="14" x2="25" y2="14" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="32" y="18" font-size="10" fill="#6b7280">API 请求</text>
    <line x1="0" y1="30" x2="25" y2="30" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
    <text x="32" y="34" font-size="10" fill="#6b7280">LLM 调用</text>
    <line x1="0" y1="46" x2="25" y2="46" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="32" y="50" font-size="10" fill="#6b7280">KV 读写</text>
    <line x1="0" y1="62" x2="25" y2="62" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="32" y="66" font-size="10" fill="#6b7280">管线流</text>
  </g>
</svg>
