name = "icon-forge-worker"
main = "src/index.ts"
compatibility_date = "2024-12-18"

routes = [
  { pattern = "api-icon.weweekly.online/*", zone_name = "weweekly.online" }
]

[vars]
ENVIRONMENT = "production"
# SPEC-160: LLM API Gateway。仅 URL，访问凭证走 LLM_SERVICE_TOKEN secret。
LLM_GATEWAY_URL = "https://api-llm.weweekly.online"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "3a4327db33b842f893ab3d2dcf6cf081"

[durable_objects]
bindings = [
  { name = "GENERATION_QUEUE", class_name = "GenerationQueue" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GenerationQueue"]

# Secrets (set via `wrangler secret put`):
# - LLM_SERVICE_TOKEN   (SPEC-160; 值：SERVICE_TOKEN_ICON_FORGE / cindy deploy 时写入)
# 旧 secret（保留 30 天 rollback 窗后删除）：
# - DASHSCOPE_API_KEY
